name: Docker Publish

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  smoke:
    name: Docker Smoke Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build --build-arg GIT_SHA="$(git rev-parse --short HEAD)" -t gpcr-tools:release .

      - name: Smoke – baked code version
        run: |
          SHA=$(git rev-parse --short HEAD)
          BAKED=$(docker run --rm --entrypoint python gpcr-tools:release \
            -c "from gpcr_tools.code_version import get_code_version; print(get_code_version())")
          echo "Resolved in image: $BAKED (expected $SHA)"
          test "$BAKED" = "$SHA"

      - name: Smoke – init-workspace
        run: |
          WORKSPACE=$(mktemp -d)
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$WORKSPACE:/workspace" \
            -e GPCR_WORKSPACE=/workspace \
            gpcr-tools:release init-workspace
          test -f "$WORKSPACE/contract/storage_contract.json"

      - name: Smoke – curate --help
        run: |
          WORKSPACE=$(mktemp -d)
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$WORKSPACE:/workspace" \
            -e GPCR_WORKSPACE=/workspace \
            gpcr-tools:release init-workspace
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$WORKSPACE:/workspace" \
            -e GPCR_WORKSPACE=/workspace \
            gpcr-tools:release curate --help

      - name: Smoke – curate --auto-accept
        run: |
          WORKSPACE=$(mktemp -d)
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$WORKSPACE:/workspace" \
            -e GPCR_WORKSPACE=/workspace \
            gpcr-tools:release init-workspace
          cp tests/fixtures/sample_pdb_simple.json "$WORKSPACE/aggregated/TEST1.json"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$WORKSPACE:/workspace" \
            -e GPCR_WORKSPACE=/workspace \
            gpcr-tools:release curate --auto-accept
          test -f "$WORKSPACE/output/csv/structures.csv"
          test -f "$WORKSPACE/output/audit/audit_trail.jsonl"
          test -f "$WORKSPACE/state/processed_log.json"

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [smoke]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Resolve short commit
        run: echo "GIT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            GIT_SHA=${{ env.GIT_SHA }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
